modeling:
  target_error_percent: 15.0
  decomposition:
    constant_energy: true
    static_energy: true
    dynamic_energy: true
    v1_boundary_doc: harness/design-spec/modeling.md
    constant_power_source: idle_baseline
    static_power_source: full_sm_active_noop_minus_idle
    static_activity_scaling: none
    dynamic_rhs: measured_energy_minus_const_static
  solver:
    type: non_negative_least_squares
    enforce_non_negative: true
    reject_negative_dynamic_rhs: true
    reject_negative_predictions: true
    save_matrix: true
    save_residuals: true
  coverage:
    keep_raw_opcodes: true
    allow_grouping: true
    allow_scaling: true
    allow_bucketing: true
    report_unknown_fraction: true

inputs:
  baseline_power_root: experiments/static_power/raw
  static_power_processed_root: experiments/static_power/processed
  microbench_processed_root: experiments/processed/microbench
  operator_sass_root: experiments/processed/operator_sass
  operator_power_root: experiments/raw/operator_power

outputs:
  model_root: experiments/processed/modeling
  reports_root: experiments/reports
