nvml:
  baseline_output_root: experiments/static_power/raw
  microbench_output_root: experiments/raw/microbench_power
  operator_output_root: experiments/raw/operator_power
  sample_interval_ms: 100
  prefer_total_energy_counter: true
  record_power_usage: true
  record_utilization: true
  record_temperature: true
  record_clocks: true

run_policy:
  exclusive_gpu_required: true
  persistence_mode: enable_if_permitted
  lock_sm_clock_mhz: TBD
  lock_mem_clock_mhz: TBD
  power_limit_w: TBD
  warmup_seconds: 30
  measurement_seconds: 180
  cooldown_seconds: 60
  repeats: 5

repeatability_thresholds:
  median_power_cv_percent_max: 2.0
  total_energy_cv_percent_max: 2.0
  runtime_cv_percent_max: 1.0
  plateau_power_cv_percent_max: 1.5
  plateau_temperature_drift_c_max: 3.0
  start_temperature_spread_c_max: 5.0
  sm_clock_drift_percent_max: 1.0
  sm_clock_drift_mhz_max: 15
  mem_clock_drift_percent_max: 1.0
  mem_clock_drift_mhz_max: 15
  saturation_gpu_utilization_percent_min: 95.0

metadata:
  require_driver_version: true
  require_cuda_version: true
  require_ncu_version: true
  require_gpu_uuid: true
  require_command: true
  require_hyperparameters: true
